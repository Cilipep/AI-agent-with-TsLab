<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>3D Архитектура нейросети - NN Trading</title>
<style>
body { margin: 0; background: #0a0a1a; font-family: Arial, sans-serif; overflow: hidden; }
#info { position: absolute; top: 10px; left: 10px; color: #fff; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; max-width: 350px; }
#info h2 { margin: 0 0 10px 0; color: #00ccff; font-size: 16px; }
#info p { margin: 5px 0; font-size: 13px; color: #ccc; }
.legend { display: flex; gap: 15px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #aaa; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
#tooltip { position: absolute; display: none; background: rgba(0,20,40,0.9); color: #fff; padding: 10px; border-radius: 5px; font-size: 12px; pointer-events: none; z-index: 100; border: 1px solid #00ccff; }
canvas { display: block; }
</style>
</head>
<body>
<div id="info">
  <h2>3D Архитектура: HybridEnsemble</h2>
  <p><b>Модель:</b> DQN RL Agent + HybridEnsemble (7 моделей)</p>
  <p><b>Вход:</b> 50 мультитаймфреймовых фичей (1d + 1w + 1M)</p>
  <p><b>Окно:</b> 30 баров历史数据</p>
  <p><b>Выход:</b> Buy / Hold / Sell (3 действия)</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00ccff"></div>LSTM</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6600"></div>Transformer</div>
    <div class="legend-item"><div class="legend-dot" style="background:#00ff88"></div>XGBoost</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff0066"></div>CatBoost</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffff00"></div>LightGBM</div>
    <div class="legend-item"><div class="legend-dot" style="background:#aa00ff"></div>RF</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffffff"></div>Meta-Learner</div>
  </div>
</div>
<div id="tooltip"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a1a);
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 0.6));
const dl = new THREE.DirectionalLight(0xffffff, 0.8);
dl.position.set(10, 20, 10);
scene.add(dl);

// Materials
const matInput = new THREE.MeshPhongMaterial({color: 0x336699, transparent: true, opacity: 0.8});
const matLSTM = new THREE.MeshPhongMaterial({color: 0x00ccff, transparent: true, opacity: 0.8});
const matAttn = new THREE.MeshPhongMaterial({color: 0xff6600, transparent: true, opacity: 0.8});
const matML = new THREE.MeshPhongMaterial({color: 0x00ff88, transparent: true, opacity: 0.8});
const matMeta = new THREE.MeshPhongMaterial({color: 0xffffff, transparent: true, opacity: 0.8});
const matOutput = new THREE.MeshPhongMaterial({color: 0xff0066, transparent: true, opacity: 0.8});
const matLine = new THREE.LineBasicMaterial({color: 0x334466, transparent: true, opacity: 0.4});

// Layer positions
const layers = [];
function addLayer(x, y, z, count, mat, size, name, desc) {
  const group = new THREE.Group();
  group.position.set(x, y, z);
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(size, 16, 16);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = (i - (count-1)/2) * (size * 3);
    mesh.userData = {name, desc};
    group.add(mesh);
  }
  layers.push(group);
  scene.add(group);
  return group;
}

// Build network
const g1 = addLayer(-12, 0, 0, 10, matInput, 0.3, "Input Layer", "50 мультитаймфреймовых фичей\n(EMA, RSI, MACD, BB, ATR, ADX, Stoch, Williams, CCI, ROC)\n1d + 1w + 1M таймфреймы");
const g2 = addLayer(-6, 0, 0, 8, matLSTM, 0.35, "LSTM Layer", "Hidden: 64, Layers: 2\nDropout: 0.3\nЗапоминает последовательности");
const g3 = addLayer(0, 0, 0, 8, matAttn, 0.35, "Attention Layer", "Multi-head attention\n8 heads, hidden: 64\nНаходит важные паттерны");
const g4 = addLayer(6, 0, 0, 6, matML, 0.3, "ML Models", "XGBoost + CatBoost\nLightGBM + RandomForest\nГрадиентный бустинг");
const g5 = addLayer(10, 0, 0, 3, matMeta, 0.4, "Meta-Learner", "Stacking ensemble\nКомбинирует предсказания\n7 базовых моделей");
const g6 = addLayer(14, 0, 0, 3, matOutput, 0.35, "Output", "Buy / Hold / Sell\nConfidence threshold: 0.6+\nRL оптимизирует PnL");

// Connect layers
function connectLayers(g1, g2) {
  g1.children.forEach(n1 => {
    g2.children.forEach(n2 => {
      const points = [n1.position.clone(), n2.position.clone()];
      points[0].add(g1.position);
      points[1].add(g2.position);
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      scene.add(new THREE.Line(geo, matLine));
    });
  });
}
connectLayers(g1, g2);
connectLayers(g2, g3);
connectLayers(g3, g4);
connectLayers(g4, g5);
connectLayers(g5, g6);

// Labels using sprites
function addLabel(text, x, y, z) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#00ccff';
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 64);
  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({map: texture, transparent: true});
  const sprite = new THREE.Sprite(material);
  sprite.position.set(x, y - 4, z);
  sprite.scale.set(4, 1, 1);
  scene.add(sprite);
}
addLabel("Input (50 features)", -12, 0, 0);
addLabel("LSTM", -6, 0, 0);
addLabel("Attention", 0, 0, 0);
addLabel("ML Models", 6, 0, 0);
addLabel("Meta-Learner", 10, 0, 0);
addLabel("Output", 14, 0, 0);

camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

// Tooltip
const tooltip = document.getElementById('tooltip');
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

document.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(scene.children, true);
  if (intersects.length > 0 && intersects[0].object.userData.name) {
    const d = intersects[0].object.userData;
    tooltip.style.display = 'block';
    tooltip.style.left = e.clientX + 15 + 'px';
    tooltip.style.top = e.clientY + 15 + 'px';
    tooltip.innerHTML = '<b>' + d.name + '</b><br>' + d.desc.replace(/\n/g, '<br>');
  } else {
    tooltip.style.display = 'none';
  }
});

// Animation
let angle = 0;
function animate() {
  requestAnimationFrame(animate);
  angle += 0.003;
  camera.position.x = Math.sin(angle) * 20;
  camera.position.z = Math.cos(angle) * 20;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
