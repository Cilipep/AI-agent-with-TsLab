<!DOCTYPE html>
<html>
<head>
    <title>NN Trading Models</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a1a; font-family: Arial; }
        #info { position: absolute; top: 10px; left: 10px; color: white; }
        h1 { margin: 0; font-size: 20px; color: #4CAF50; }
        p { margin: 3px 0; font-size: 12px; color: #888; }
        #legend { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 11px; }
        .leg { display: inline-block; margin-right: 10px; }
        .leg span { display: inline-block; width: 12px; height: 12px; margin-right: 4px; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="info">
        <h1>NN Trading Models</h1>
        <p>LSTM + Attention Ensemble | 12 Instruments | 15m</p>
    </div>
    <div id="legend">
        <span class="leg"><span style="background:#4CAF50"></span>Input (55 features)</span>
        <span class="leg"><span style="background:#2196F3"></span>LSTM (64 hidden)</span>
        <span class="leg"><span style="background:#FF9800"></span>Attention (8 heads)</span>
        <span class="leg"><span style="background:#9C27B0"></span>Output (1 signal)</span>
    </div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0a0a1a);
        document.body.appendChild(renderer.domElement);

        // Materials
        const inputMat = new THREE.MeshBasicMaterial({color: 0x4CAF50, transparent: true, opacity: 0.7});
        const lstmMat = new THREE.MeshBasicMaterial({color: 0x2196F3, transparent: true, opacity: 0.7});
        const attMat = new THREE.MeshBasicMaterial({color: 0xFF9800, transparent: true, opacity: 0.7});
        const outMat = new THREE.MeshBasicMaterial({color: 0x9C27B0, transparent: true, opacity: 0.7});

        // Input layer (55 features -> 25 selected)
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j < 5; j++) {
                const geom = new THREE.BoxGeometry(0.3, 0.3, 0.3);
                const mesh = new THREE.Mesh(geom, inputMat);
                mesh.position.set(i * 0.4 - 0.8, j * 0.4 - 0.8, -5);
                scene.add(mesh);
            }
        }

        // LSTM cells
        for (let i = 0; i < 4; i++) {
            const geom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const mesh = new THREE.Mesh(geom, lstmMat);
            mesh.position.set(i * 0.6 - 0.9, 0, -3);
            scene.add(mesh);
        }

        // Attention heads
        for (let i = 0; i < 4; i++) {
            const geom = new THREE.SphereGeometry(0.25, 16, 16);
            const mesh = new THREE.Mesh(geom, attMat);
            mesh.position.set(i * 0.6 - 0.9, 1, -3);
            scene.add(mesh);
        }

        // Output
        const outGeom = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const outMesh = new THREE.Mesh(outGeom, outMat);
        outMesh.position.set(0, 0, -1);
        scene.add(outMesh);

        // Connections
        const lineMat = new THREE.LineBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.3});

        // Input to LSTM
        for (let i = 0; i < 4; i++) {
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(i * 0.4 - 0.8, 0, -5),
                new THREE.Vector3(i * 0.6 - 0.9, 0, -3)
            ]), lineMat));
        }

        // LSTM to Attention
        for (let i = 0; i < 4; i++) {
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(i * 0.6 - 0.9, 0, -3),
                new THREE.Vector3(i * 0.6 - 0.9, 1, -3)
            ]), lineMat));
        }

        // Attention to Output
        for (let i = 0; i < 4; i++) {
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(i * 0.6 - 0.9, 1, -3),
                new THREE.Vector3(0, 0, -1)
            ]), lineMat));
        }

        camera.position.set(0, 1, 4);
        camera.lookAt(0, 0, -2);

        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            angle += 0.003;
            camera.position.x = Math.sin(angle) * 4;
            camera.position.z = Math.cos(angle) * 4;
            camera.lookAt(0, 0, -2);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
