<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Trading — 3D Визуализация моделей нейросетей</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #e0e0e0; }

#canvas3d { width: 100vw; height: 100vh; display: block; }

/* Left sidebar */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 300px;
  background: rgba(10,10,30,0.92); backdrop-filter: blur(12px);
  border-right: 1px solid rgba(255,255,255,0.08);
  display: flex; flex-direction: column; z-index: 10;
  transition: transform 0.3s;
}
#sidebar.collapsed { transform: translateX(-300px); }

#sidebar-header {
  padding: 16px 20px;
  background: linear-gradient(135deg, rgba(0,204,255,0.15), rgba(170,0,255,0.1));
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
#sidebar-header h1 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 2px; }
#sidebar-header p { font-size: 11px; color: #888; }

/* Tabs */
#model-tabs {
  display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  max-height: 160px; overflow-y: auto;
}
#model-tabs::-webkit-scrollbar { width: 3px; }
#model-tabs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
.tab-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04); color: #aaa; font-size: 10px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.tab-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.tab-btn.active { background: rgba(0,204,255,0.2); color: #00ccff; border-color: rgba(0,204,255,0.4); }
.tab-btn.ensemble { border-color: rgba(255,255,255,0.2); }
.tab-btn.ensemble.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.4); }

/* Info panel */
#info-panel {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  font-size: 11px; line-height: 1.5;
}
#info-panel::-webkit-scrollbar { width: 3px; }
#info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

.info-section { margin-bottom: 12px; }
.info-section h3 { color: #00ccff; font-size: 11px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.info-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.info-row .label { color: #888; }
.info-row .value { color: #ccc; font-family: 'Consolas', monospace; font-size: 10px; }

.layer-item {
  padding: 6px 8px; margin: 3px 0; border-radius: 4px;
  background: rgba(255,255,255,0.03); border-left: 3px solid #333;
  cursor: pointer; transition: all 0.15s;
}
.layer-item:hover { background: rgba(255,255,255,0.08); }
.layer-item .layer-name { color: #ddd; font-weight: 600; font-size: 11px; }
.layer-item .layer-detail { color: #777; font-size: 9px; margin-top: 2px; font-family: 'Consolas', monospace; }

/* Right controls */
#controls {
  position: fixed; right: 12px; top: 12px; z-index: 10;
  display: flex; flex-direction: column; gap: 6px;
}
.ctrl-btn {
  width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(10,10,30,0.85); backdrop-filter: blur(8px);
  color: #aaa; font-size: 16px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.ctrl-btn.active { background: rgba(0,204,255,0.2); color: #00ccff; border-color: rgba(0,204,255,0.4); }

/* Toggle sidebar */
#toggle-sidebar {
  position: fixed; left: 306px; top: 50%; transform: translateY(-50%); z-index: 11;
  width: 20px; height: 40px; border-radius: 0 6px 6px 0;
  background: rgba(10,10,30,0.85); border: 1px solid rgba(255,255,255,0.12);
  border-left: none; color: #888; cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: left 0.3s;
}
#sidebar.collapsed ~ #toggle-sidebar { left: 0; }

/* Bottom bar */
#stats-bar {
  position: fixed; bottom: 0; left: 300px; right: 0; height: 32px;
  background: rgba(10,10,30,0.9); border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; padding: 0 16px; gap: 20px;
  font-size: 10px; color: #666; z-index: 10;
  transition: left 0.3s;
}
#sidebar.collapsed ~ #stats-bar { left: 0; }
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Tooltip */
#tooltip {
  position: fixed; pointer-events: none; z-index: 100;
  background: rgba(10,10,30,0.95); backdrop-filter: blur(12px);
  border: 1px solid rgba(0,204,255,0.3); border-radius: 8px;
  padding: 10px 14px; max-width: 280px; display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#tooltip .tt-title { color: #00ccff; font-weight: 700; font-size: 12px; margin-bottom: 4px; }
#tooltip .tt-detail { color: #999; font-size: 10px; line-height: 1.4; font-family: 'Consolas', monospace; }

/* Language toggle */
#lang-toggle {
  position: fixed; top: 12px; right: 56px; z-index: 10;
  display: flex; gap: 4px;
}
.lang-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(10,10,30,0.85); color: #888; font-size: 11px;
  cursor: pointer; transition: all 0.2s;
}
.lang-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.lang-btn.active { background: rgba(0,204,255,0.2); color: #00ccff; border-color: rgba(0,204,255,0.4); }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>NN Trading — 3D Архитектура</h1>
    <p data-i18n="subtitle">Интерактивная визуализация нейросетей</p>
  </div>
  <div id="model-tabs"></div>
  <div id="info-panel"></div>
</div>

<button id="toggle-sidebar" onclick="toggleSidebar()">◀</button>

<div id="controls">
  <button class="ctrl-btn active" id="btn-rotate" onclick="toggleAutoRotate()" title="Авто-вращение">⟳</button>
  <button class="ctrl-btn" id="btn-wireframe" onclick="toggleWireframe()" title="Wireframe">▦</button>
  <button class="ctrl-btn" id="btn-reset" onclick="resetView()" title="Сброс вида">⌂</button>
  <button class="ctrl-btn" id="btn-labels" onclick="toggleLabels()" title="Метки слоёв">Aa</button>
</div>

<div id="lang-toggle">
  <button class="lang-btn active" onclick="setLang('ru')">RU</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<div id="stats-bar">
  <div class="stat-item"><div class="stat-dot" style="background:#00ccff"></div><span id="stat-models">10 моделей</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#ff6600"></div><span id="stat-ensembles">4 ансамбля</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#33cc66"></div><span id="stat-features">55+ признаков</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#ff3366"></div><span id="stat-params">~200K+ параметров</span></div>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-detail"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

let currentLang = 'ru';
function t(key, replacements) {
  const keys = key.split('.');
  let val = i18n[currentLang];
  for (const k of keys) val = val?.[k];
  if (!val) return key;
  if (replacements) Object.entries(replacements).forEach(([rk, rv]) => val = val.replace(`{${rk}}`, rv));
  return val;
}
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);

  document.querySelectorAll('.tab-btn').forEach(btn => {
    const key = btn.dataset.tab;
    if (i18n[currentLang].tabs[key]) btn.textContent = i18n[currentLang].tabs[key];
  });
  updateInfoPanel();
}
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));

}

// ═══════════════════════════════════════════════════════════════
// 3D Builder Functions
// ═══════════════════════════════════════════════════════════════
function createNeuron(x, y, z, color, radius, type) {
  let geo;
  if (type === 'linear' || type === 'proj' || type === 'batchnorm' || type === 'layernorm') {
    geo = new THREE.BoxGeometry(radius * 1.4, radius * 1.4, radius * 1.4);
  } else if (type === 'dropout') {
    geo = new THREE.OctahedronGeometry(radius * 0.8);
  } else if (type === 'output') {
    geo = new THREE.SphereGeometry(radius * 1.1, 16, 16);
  } else {
    geo = new THREE.SphereGeometry(radius, 12, 12);
  }
  const mat = new THREE.MeshPhongMaterial({
    color, emissive: color, emissiveIntensity: 0.15,
    transparent: true, opacity: 0.88, wireframe: wireframeMode
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.userData = { baseEmissive: 0.15, baseColor: color };
  allMeshes.push(mesh);
  return mesh;
}

function createConnection(p1, p2, color) {
  const points = [new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p2.y, p2.z)];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.25 });
  return new THREE.Line(geo, mat);
}

function createLayerGroup(layerDef, xOffset, yBase, zOffset) {
  const group = new THREE.Group();
  const n = layerDef.neurons;
  const spacing = 0.9;
  const startY = yBase;

  for (let i = 0; i < n; i++) {
    const y = startY + (i - (n - 1) / 2) * spacing;
    const neuron = createNeuron(xOffset, y, zOffset, layerDef.color, 0.35, layerDef.type);
    group.add(neuron);
  }

  // Label
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 512; labelCanvas.height = 128;
  const ctx = labelCanvas.getContext('2d');
  ctx.fillStyle = 'rgba(10,10,30,0.8)';
  ctx.roundRect(0, 0, 512, 128, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(' + ((layerDef.color >> 16) & 0xff) + ',' + ((layerDef.color >> 8) & 0xff) + ',' + (layerDef.color & 0xff) + ',0.5)';
  ctx.lineWidth = 2;
  ctx.roundRect(0, 0, 512, 128, 16);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 32px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText(layerDef.name, 256, 50);
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '24px Consolas';
  if (layerDef.shape) ctx.fillText(layerDef.shape, 256, 85);

  const texture = new THREE.CanvasTexture(labelCanvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.9 });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(xOffset, yBase + (n - 1) / 2 * spacing + 1.2, zOffset);
  sprite.scale.set(3, 0.75, 1);
  sprite.userData = { isLabel: true };
  group.add(sprite);
  labelSprites.push(sprite);

  return { group, neurons: group.children.filter(c => c.isMesh), yTop: startY + (n - 1) / 2 * spacing + spacing };
}

function buildSimpleModel(def) {
  const group = new THREE.Group();
  const layerSpacing = 3.5;
  const xOffset = -((def.layers.length - 1) * layerSpacing) / 2;
  let prevNeurons = [];

  def.layers.forEach((layer, li) => {
    const x = xOffset + li * layerSpacing;
    const result = createLayerGroup(layer, x, 0, 0);
    group.add(result.group);

    // Connect to previous layer
    if (prevNeurons.length > 0) {
      result.neurons.forEach(n => {
        const connectCount = Math.min(3, prevNeurons.length);
        for (let c = 0; c < connectCount; c++) {
          const pi = Math.floor(c * prevNeurons.length / connectCount);
          group.add(createConnection(prevNeurons[pi].position, n.position, layer.color));
        }
      });
    }
    prevNeurons = result.neurons;
  });

  return group;
}

function buildMultiBranchModel(def) {
  const group = new THREE.Group();
  const layerSpacing = 3.5;
  const xOffset = -((def.layers.length - 1) * layerSpacing) / 2;
  let prevNeurons = [];

  // Shared layers
  def.layers.forEach((layer, li) => {
    const x = xOffset + li * layerSpacing;
    const result = createLayerGroup(layer, x, 0, 0);
    group.add(result.group);
    if (prevNeurons.length > 0) {
      result.neurons.forEach(n => {
        const connectCount = Math.min(3, prevNeurons.length);
        for (let c = 0; c < connectCount; c++) {
          const pi = Math.floor(c * prevNeurons.length / connectCount);
          group.add(createConnection(prevNeurons[pi].position, n.position, layer.color));
        }
      });
    }
    prevNeurons = result.neurons;
  });

  // Branches
  const branchSpacing = 6;
  const branchXStart = xOffset + def.layers.length * layerSpacing;
  const numBranches = def.branches.length;
  const totalHeight = (numBranches - 1) * branchSpacing;

  def.branches.forEach((branch, bi) => {
    const yOff = -totalHeight / 2 + bi * branchSpacing;
    let branchPrev = prevNeurons;
    branch.layers.forEach((layer, li) => {
      const x = branchXStart + li * layerSpacing;
      const neurons = [];
      const n = layer.neurons;
      const spacing = 0.9;
      const yBase = yOff;
      for (let i = 0; i < n; i++) {
        const y = yBase + (i - (n - 1) / 2) * spacing;
        const z = (bi - (numBranches - 1) / 2) * 2;
        const neuron = createNeuron(x, y, z, layer.color, 0.35, layer.type);
        group.add(neuron);
        neurons.push(neuron);
      }
      // Label
      const labelCanvas = document.createElement('canvas');
      labelCanvas.width = 512; labelCanvas.height = 96;
      const ctx = labelCanvas.getContext('2d');
      ctx.fillStyle = 'rgba(10,10,30,0.8)';
      ctx.roundRect(0, 0, 512, 96, 12);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 28px Segoe UI';
      ctx.textAlign = 'center';
      const name = currentLang === 'ru' ? (layer.nameRu || branch.nameRu || layer.name) : (branch.name || layer.name);
      ctx.fillText(name, 256, 40);
      ctx.fillStyle = '#aaaaaa';
      ctx.font = '22px Consolas';
      if (layer.shape) ctx.fillText(layer.shape, 256, 70);
      const texture = new THREE.CanvasTexture(labelCanvas);
      const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.9 });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.set(x, yBase + (n - 1) / 2 * spacing + 1.0, (bi - (numBranches - 1) / 2) * 2);
      sprite.scale.set(2.5, 0.55, 1);
      sprite.userData = { isLabel: true };
      group.add(sprite);
      labelSprites.push(sprite);

      if (branchPrev.length > 0 && li === 0) {
        neurons.forEach(n => {
          const connectCount = Math.min(2, branchPrev.length);
          for (let c = 0; c < connectCount; c++) {
            const pi = Math.floor(c * branchPrev.length / connectCount);
            group.add(createConnection(branchPrev[pi].position, n.position, layer.color));
          }
        });
      } else if (li > 0) {
        neurons.forEach(n => {
          const connectCount = Math.min(2, branchPrev.length);
          for (let c = 0; c < connectCount; c++) {
            const pi = Math.floor(c * branchPrev.length / connectCount);
            group.add(createConnection(branchPrev[pi].position, n.position, layer.color));
          }
        });
      }
      branchPrev = neurons;
    });
  });

  return group;
}

function buildEnsembleModel(def, stacking) {
  const group = new THREE.Group();
  const modelColors = [0x00ccff, 0xff6600, 0xaa00ff, 0xff0066];
  const modelNames = def.ensembleModels || ['M1', 'M2', 'M3', 'M4'];
  const spacing = 4;
  const startX = -((modelNames.length - 1) * spacing) / 2;

  modelNames.forEach((name, mi) => {
    const x = startX + mi * spacing;
    // Mini model representation
    const layers = [
      { n: 8, color: 0x336699, type: 'input' },
      { n: 12, color: modelColors[mi], type: 'lstm' },
      { n: 6, color: 0x00aa66, type: 'linear' },
      { n: 1, color: 0xff3333, type: 'output' }
    ];
    let prevN = [];
    layers.forEach((l, li) => {
      const yBase = 0;
      const neurons = [];
      for (let i = 0; i < l.n; i++) {
        const y = yBase + (i - (l.n - 1) / 2) * 0.7;
        const z = (mi - (modelNames.length - 1) / 2) * 2;
        const neuron = createNeuron(x + li * 2, y, z, l.color, 0.25, l.type);
        group.add(neuron);
        neurons.push(neuron);
      }
      if (prevN.length > 0) {
        neurons.forEach(n => {
          const cc = Math.min(2, prevN.length);
          for (let c = 0; c < cc; c++) {
            const pi = Math.floor(c * prevN.length / cc);
            group.add(createConnection(prevN[pi].position, n.position, l.color));
          }
        });
      }
      prevN = neurons;
    });

    // Label per model
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 256; labelCanvas.height = 64;
    const ctx = labelCanvas.getContext('2d');
    ctx.fillStyle = 'rgba(10,10,30,0.8)';
    ctx.roundRect(0, 0, 256, 64, 8);
    ctx.fill();
    ctx.fillStyle = '#' + modelColors[mi].toString(16).padStart(6, '0');
    ctx.font = 'bold 22px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(name, 128, 42);
    const tex = new THREE.CanvasTexture(labelCanvas);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 }));
    spr.position.set(x + 3, 8, (mi - (modelNames.length - 1) / 2) * 2);
    spr.scale.set(2, 0.5, 1);
    group.add(spr);
    labelSprites.push(spr);
  });

  // Merge point
  if (stacking && def.metaLayers) {
    const mergeX = startX + 4 * spacing;
    let prevN = [];
    // Connect all model outputs to meta learner
    const allOutputs = [];
    modelNames.forEach((_, mi) => {
      const z = (mi - (modelNames.length - 1) / 2) * 2;
      allOutputs.push(new THREE.Vector3(mergeX - 2, -2, z));
    });

    def.metaLayers.forEach((layer, li) => {
      const x = mergeX + li * 2.5;
      const neurons = [];
      for (let i = 0; i < layer.neurons; i++) {
        const y = (i - (layer.neurons - 1) / 2) * 0.8;
        const neuron = createNeuron(x, y, 0, layer.color, 0.3, layer.type);
        group.add(neuron);
        neurons.push(neuron);
      }
      if (li === 0) {
        neurons.forEach(n => {
          allOutputs.forEach(p => group.add(createConnection(p, n.position, 0xffffff)));
        });
      } else if (prevN.length > 0) {
        neurons.forEach(n => {
          const cc = Math.min(3, prevN.length);
          for (let c = 0; c < cc; c++) {
            group.add(createConnection(prevN[c].position, n.position, layer.color));
          }
        });
      }
      prevN = neurons;
    });

    // Meta learner label
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 384; labelCanvas.height = 64;
    const ctx = labelCanvas.getContext('2d');
    ctx.fillStyle = 'rgba(10,10,30,0.8)';
    ctx.roundRect(0, 0, 384, 64, 8);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(currentLang === 'ru' ? 'Мета-обучатель' : 'Meta-learner', 192, 42);
    const tex = new THREE.CanvasTexture(labelCanvas);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 }));
    spr.position.set(mergeX + 4, 6, 0);
    spr.scale.set(3, 0.5, 1);
    group.add(spr);
    labelSprites.push(spr);
  }

  // Ensemble label
  if (!stacking) {
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 512; labelCanvas.height = 80;
    const ctx = labelCanvas.getContext('2d');
    ctx.fillStyle = 'rgba(10,10,30,0.8)';
    ctx.roundRect(0, 0, 512, 80, 12);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 26px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(currentLang === 'ru' ? 'Взвешенное усреднение логитов' : 'Weighted logit averaging', 256, 50);
    const tex = new THREE.CanvasTexture(labelCanvas);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 }));
    spr.position.set(0, -8, 0);
    spr.scale.set(4, 0.6, 1);
    group.add(spr);
    labelSprites.push(spr);
  }

  return group;
}

function buildHybridModel(def) {
  const group = new THREE.Group();
  const modelColors = [0x00ccff, 0xff6600, 0xaa00ff, 0xff0066];
  const nnNames = def.ensembleModels;
  const sklearnDefs = def.sklearnModels;

  // Neural network models (top row)
  const nnSpacing = 3.5;
  const nnStartX = -((nnNames.length - 1) * nnSpacing) / 2 - 3;
  const nnY = 5;

  nnNames.forEach((name, mi) => {
    const x = nnStartX + mi * nnSpacing;
    const n = [8, 10, 5, 1];
    const colors = [0x336699, modelColors[mi], 0x00aa66, 0xff3333];
    let prevN = [];
    n.forEach((count, li) => {
      const neurons = [];
      for (let i = 0; i < count; i++) {
        const y = nnY + (i - (count - 1) / 2) * 0.6;
        const neuron = createNeuron(x + li * 1.8, y, 0, colors[li], 0.2, li === 0 ? 'input' : 'linear');
        group.add(neuron);
        neurons.push(neuron);
      }
      if (prevN.length > 0) {
        neurons.forEach(n => {
          const cc = Math.min(2, prevN.length);
          for (let c = 0; c < cc; c++) group.add(createConnection(prevN[c].position, n.position, colors[li]));
        });
      }
      prevN = neurons;
    });
    // Label
    const lc = document.createElement('canvas');
    lc.width = 256; lc.height = 48;
    const ctx = lc.getContext('2d');
    ctx.fillStyle = '#' + modelColors[mi].toString(16).padStart(6, '0');
    ctx.font = 'bold 22px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(name, 128, 32);
    const tex = new THREE.CanvasTexture(lc);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 }));
    spr.position.set(x + 2.7, nnY + 5, 0);
    spr.scale.set(2, 0.4, 1);
    group.add(spr);
    labelSprites.push(spr);
  });

  // sklearn models (bottom row)
  const skSpacing = 3;
  const skStartX = -((sklearnDefs.length - 1) * skSpacing) / 2 - 2;
  const skY = -5;

  sklearnDefs.forEach((sk, si) => {
    const x = skStartX + si * skSpacing;
    // Single block for sklearn
    const blockGeo = new THREE.BoxGeometry(1.5, 3, 1.5);
    const blockMat = new THREE.MeshPhongMaterial({
      color: sk.color, emissive: sk.color, emissiveIntensity: 0.2,
      transparent: true, opacity: 0.85, wireframe: wireframeMode
    });
    const block = new THREE.Mesh(blockGeo, blockMat);
    block.position.set(x, skY, 0);
    block.userData = { baseEmissive: 0.2, baseColor: sk.color };
    allMeshes.push(block);
    group.add(block);

    // Label
    const lc = document.createElement('canvas');
    lc.width = 256; lc.height = 48;
    const ctx = lc.getContext('2d');
    ctx.fillStyle = '#' + sk.color.toString(16).padStart(6, '0');
    ctx.font = 'bold 22px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(sk.name, 128, 32);
    const tex = new THREE.CanvasTexture(lc);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 }));
    spr.position.set(x, skY - 2.5, 0);
    spr.scale.set(2, 0.4, 1);
    group.add(spr);
    labelSprites.push(spr);
  });

  // Merge line
  const mergeY = 0;
  const mergeX = Math.max(nnStartX + 3 * nnSpacing, skStartX + 3 * skSpacing) + 3;

  // Merge block
  const mergeGeo = new THREE.SphereGeometry(1.2, 16, 16);
  const mergeMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3, wireframe: wireframeMode });
  const mergeBlock = new THREE.Mesh(mergeGeo, mergeMat);
  mergeBlock.position.set(mergeX, mergeY, 0);
  allMeshes.push(mergeBlock);
  group.add(mergeBlock);

  // Connections from NN outputs to merge
  nnNames.forEach((_, mi) => {
    const x = nnStartX + mi * nnSpacing + 3 * 1.8;
    group.add(createConnection(new THREE.Vector3(x, nnY, 0), mergeBlock.position, 0x555555));
  });
  // Connections from sklearn to merge
  sklearnDefs.forEach((_, si) => {
    const x = skStartX + si * skSpacing;
    group.add(createConnection(new THREE.Vector3(x, skY, 0), mergeBlock.position, 0x555555));
  });

  // Output
  const outGeo = new THREE.SphereGeometry(0.6, 12, 12);
  const outMat = new THREE.MeshPhongMaterial({ color: 0xff3333, emissive: 0xff3333, emissiveIntensity: 0.3, wireframe: wireframeMode });
  const outMesh = new THREE.Mesh(outGeo, outMat);
  outMesh.position.set(mergeX + 4, mergeY, 0);
  allMeshes.push(outMesh);
  group.add(outMesh);
  group.add(createConnection(mergeBlock.position, outMesh.position, 0xff3333));

  // Labels
  const mergeLabel = document.createElement('canvas');
  mergeLabel.width = 256; mergeLabel.height = 48;
  const mctx = mergeLabel.getContext('2d');
  mctx.fillStyle = '#ffffff';
  mctx.font = 'bold 20px Segoe UI';
  mctx.textAlign = 'center';
  mctx.fillText(currentLang === 'ru' ? 'Усреднение' : 'Averaging', 128, 32);
  const mtex = new THREE.CanvasTexture(mergeLabel);
  const mspr = new THREE.Sprite(new THREE.SpriteMaterial({ map: mtex, transparent: true, opacity: 0.9 }));
  mspr.position.set(mergeX, mergeY + 2.5, 0);
  mspr.scale.set(2, 0.4, 1);
  group.add(mspr);
  labelSprites.push(mspr);

  return group;
}

// ═══════════════════════════════════════════════════════════════
// Build View
// ═══════════════════════════════════════════════════════════════
function clearScene() {
  if (currentGroup) {
    scene.remove(currentGroup);
    currentGroup.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
  }
  allMeshes = [];
  labelSprites = [];
}

function buildView(modelKey) {
  clearScene();
  const def = modelDefs[modelKey];
  if (!def) return;

  if (modelKey === 'ensemble') {
    currentGroup = buildEnsembleModel(def, false);
  } else if (modelKey === 'stacking') {
    currentGroup = buildEnsembleModel(def, true);
  } else if (modelKey === 'hybrid') {
    currentGroup = buildHybridModel(def);
  } else if (def.branches) {
    currentGroup = buildMultiBranchModel(def);
  } else {
    currentGroup = buildSimpleModel(def);
  }

  scene.add(currentGroup);
  resetView();
  updateInfoPanel();
}

// ═══════════════════════════════════════════════════════════════
// Switch Model
// ═══════════════════════════════════════════════════════════════
function switchModel(key) {
  currentModel = key;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === key));
  buildView(key);
}

// ═══════════════════════════════════════════════════════════════
// Controls
// ═══════════════════════════════════════════════════════════════
function toggleAutoRotate() {
  autoRotate = !autoRotate;
  controls.autoRotate = autoRotate;
  document.getElementById('btn-rotate').classList.toggle('active', autoRotate);
}
function toggleWireframe() {
  wireframeMode = !wireframeMode;
  document.getElementById('btn-wireframe').classList.toggle('active', wireframeMode);
  allMeshes.forEach(m => { if (m.material) m.material.wireframe = wireframeMode; });
}
function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('btn-labels').classList.toggle('active', showLabels);
  labelSprites.forEach(s => s.visible = showLabels);
}
function resetView() {
  camera.position.set(0, 8, 22);
  controls.target.set(0, 0, 0);
  controls.update();
}
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  document.getElementById('toggle-sidebar').textContent = sb.classList.contains('collapsed') ? '▶' : '◀';
}

// ═══════════════════════════════════════════════════════════════
// Raycaster / Tooltip
// ═══════════════════════════════════════════════════════════════
canvas.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(allMeshes);

  const tooltip = document.getElementById('tooltip');
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj !== hoveredObj) {
      if (hoveredObj && hoveredObj.material) hoveredObj.material.emissiveIntensity = hoveredObj.userData.baseEmissive || 0.15;
      hoveredObj = obj;
      obj.material.emissiveIntensity = 0.6;
      // Find layer info
      const layerInfo = findLayerForMesh(obj);
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.querySelector('.tt-title').textContent = layerInfo?.name || 'Element';
      tooltip.querySelector('.tt-detail').textContent = layerInfo?.detail || '';
    }
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    if (hoveredObj && hoveredObj.material) hoveredObj.material.emissiveIntensity = hoveredObj.userData.baseEmissive || 0.15;
    hoveredObj = null;
    tooltip.style.display = 'none';
  }
});

function findLayerForMesh(mesh) {
  const def = modelDefs[currentModel];
  if (!def) return null;
  const allLayers = [...(def.layers || []), ...(def.branches || []).flatMap(b => b.layers), ...(def.metaLayers || [])];
  // Match by color
  return allLayers.find(l => l.color === mesh.userData.baseColor);
}

// ═══════════════════════════════════════════════════════════════
// Animation Loop
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Pulse neurons
  allMeshes.forEach((m, i) => {
    if (m.material && m.userData.baseEmissive !== undefined) {
      const pulse = Math.sin(time * 2 + i * 0.3) * 0.1 + 0.15;
      if (m !== hoveredObj) m.material.emissiveIntensity = pulse;
    }
  });

  // Rotate particles
  particles.rotation.y += 0.0003;
  particles.rotation.x += 0.0001;

  controls.update();
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════
// Resize
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
switchModel('overview');
animate();
</script>
